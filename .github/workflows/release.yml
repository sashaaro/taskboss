name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build pg${{ matrix.pg }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            pg: 18
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg }}
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-${{ matrix.pg }} \
            postgresql-server-dev-${{ matrix.pg }} \
            libclang-dev \
            clang

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version =0.18.1 --locked

      - name: Init pgrx for pg${{ matrix.pg }}
        run: |
          PG_CONFIG=$(pg_lsclusters -h | awk '{print "/usr/lib/postgresql/"$1"/bin/pg_config"}' | head -1)
          cargo pgrx init --pg${{ matrix.pg }} "$PG_CONFIG"

      - name: Build package
        run: |
          PG_CONFIG=$(pg_lsclusters -h | awk '{print "/usr/lib/postgresql/"$1"/bin/pg_config"}' | head -1)
          cargo pgrx package --pg-config "$PG_CONFIG" --features pg${{ matrix.pg }}

      - name: Create tarball
        id: tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="target/release/taskboss-pg${{ matrix.pg }}"
          ARCHIVE="taskboss-${VERSION}-pg${{ matrix.pg }}-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "$PKG_DIR" .
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskboss-pg${{ matrix.pg }}-${{ matrix.target }}
          path: ${{ steps.tarball.outputs.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "taskboss v${{ steps.meta.outputs.version }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/*
